<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萬惡部長退休倒數</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        /* 隱藏滾動條保持介面乾淨 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center p-4 selection:bg-red-900 selection:text-white">
    <div class="max-w-3xl w-full bg-zinc-900 rounded-2xl shadow-2xl border border-red-900/30 p-6 md:p-10 relative overflow-hidden">
        <!-- 裝飾性背景光暈 -->
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-red-900/20 rounded-full blur-3xl"></div>
        
        <div class="relative z-10">
            <div class="flex justify-between items-end mb-2">
                <h1 class="text-2xl md:text-4xl font-bold text-red-500 tracking-wider">萬惡部長退休倒數</h1>
                <span class="text-xs text-zinc-500 mono bg-zinc-800 px-2 py-1 rounded">v1.0.0</span>
            </div>
            <p class="text-sm md:text-base text-zinc-400 mb-8 border-b border-zinc-800 pb-4">
                Target Date: <span class="text-zinc-200 mono">2028-05-17 00:00:00</span> (Age 65)
            </p>

            <!-- 倒數計時區塊 -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="bg-black/50 p-6 rounded-xl border border-zinc-800 flex flex-col items-center justify-center backdrop-blur-sm">
                    <div id="days" class="mono text-5xl md:text-6xl font-bold text-zinc-100 mb-2">000</div>
                    <div class="text-sm text-zinc-500 font-medium tracking-widest">DAYS</div>
                </div>
                <div class="bg-black/50 p-6 rounded-xl border border-zinc-800 flex flex-col items-center justify-center backdrop-blur-sm">
                    <div id="hours" class="mono text-5xl md:text-6xl font-bold text-zinc-100 mb-2">00</div>
                    <div class="text-sm text-zinc-500 font-medium tracking-widest">HOURS</div>
                </div>
                <div class="bg-black/50 p-6 rounded-xl border border-zinc-800 flex flex-col items-center justify-center backdrop-blur-sm">
                    <div id="minutes" class="mono text-5xl md:text-6xl font-bold text-zinc-100 mb-2">00</div>
                    <div class="text-sm text-zinc-500 font-medium tracking-widest">MINS</div>
                </div>
                <div class="bg-black/50 p-6 rounded-xl border border-zinc-800 flex flex-col items-center justify-center backdrop-blur-sm relative overflow-hidden">
                    <div class="absolute inset-0 bg-red-900/10 animate-pulse"></div>
                    <div id="seconds" class="mono text-5xl md:text-6xl font-bold text-red-500 mb-2 relative z-10">00</div>
                    <div class="text-sm text-red-900/80 font-medium tracking-widest relative z-10">SECS</div>
                </div>
            </div>

            <!-- 進度條區塊 -->
            <div class="space-y-2">
                <div class="flex justify-between text-xs text-zinc-500 mono">
                    <span>STATUS: PENDING</span>
                    <span id="progress-text">0.000000%</span>
                </div>
                <div class="w-full bg-zinc-950 rounded-full h-1.5 overflow-hidden border border-zinc-800">
                    <div id="progress-bar" class="bg-red-600 h-full rounded-full transition-all duration-1000 ease-linear shadow-[0_0_10px_rgba(220,38,38,0.5)]" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 目標日期：1963/5/17 出生，65歲為 2028/5/17
        const TARGET_DATE = new Date('2028-05-17T00:00:00').getTime();
        
        // 起始基準日（用以計算進度條，此處暫以本屆任期起點 2024/5/20 為例，可自行調整）
        const START_DATE = new Date('2024-05-20T00:00:00').getTime();
        const TOTAL_DURATION = TARGET_DATE - START_DATE;

        const DOM = {
            days: document.getElementById('days'),
            hours: document.getElementById('hours'),
            minutes: document.getElementById('minutes'),
            seconds: document.getElementById('seconds'),
            progressBar: document.getElementById('progress-bar'),
            progressText: document.getElementById('progress-text')
        };

        function padZero(num, length = 2) {
            return String(num).padStart(length, '0');
        }

        function updateTimer() {
            const now = new Date().getTime();
            const distance = TARGET_DATE - now;

            // 處理已達目標的情況
            if (distance <= 0) {
                DOM.days.innerText = "000";
                DOM.hours.innerText = "00";
                DOM.minutes.innerText = "00";
                DOM.seconds.innerText = "00";
                DOM.progressBar.style.width = "100%";
                DOM.progressBar.classList.remove('bg-red-600');
                DOM.progressBar.classList.add('bg-green-600');
                DOM.progressText.innerText = "100.000000% (COMPLETED)";
                return;
            }

            // 計算時間單位
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // 更新 UI
            DOM.days.innerText = padZero(days, 3);
            DOM.hours.innerText = padZero(hours);
            DOM.minutes.innerText = padZero(minutes);
            DOM.seconds.innerText = padZero(seconds);

            // 計算並更新進度條
            const elapsed = now - START_DATE;
            let progress = (elapsed / TOTAL_DURATION) * 100;
            if (progress < 0) progress = 0;
            if (progress > 100) progress = 100;

            DOM.progressBar.style.width = `${progress}%`;
            DOM.progressText.innerText = `${progress.toFixed(6)}%`;
        }

        // 初始化與啟動計時器
        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
